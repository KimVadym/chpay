<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ошибка оплаты</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      color: #111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #b91c1c;
    }

    .status {
      font-size: 18px;
      margin-bottom: 18px;
      font-weight: bold;
      color: #b91c1c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .box {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 14px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      background: #111827;
      color: #fff;
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #111;
    }

    .note {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Ошибка оплаты</h1>
      <div class="status">Не удалось завершить оплату через KakaoPay.</div>

      <div class="grid">
        <div class="box">
          <div class="label">Номер заказа</div>
          <div class="value" id="orderNumber">...</div>
        </div>

        <div class="box">
          <div class="label">Статус</div>
          <div class="value">Ошибка</div>
        </div>
      </div>

      <div class="note">
        Попробуйте ещё раз немного позже. Если ошибка повторяется, свяжитесь с рестораном.
      </div>

      <p style="margin-top:20px;">Телефон ресторана: <strong>010-5949-7681</strong></p>

      <div class="actions">
        <a class="btn" href="/">Вернуться в меню</a>
        <a class="btn secondary" href="/order-status.html">Проверить статус</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderNumber = params.get('order');
    document.getElementById('orderNumber').textContent = orderNumber || '-';
  </script>
</body>
</html>
