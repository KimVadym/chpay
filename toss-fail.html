<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toss Payment Failed</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; color: #111; padding: 20px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .card { background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .btn { display: inline-block; text-decoration: none; padding: 12px 18px; border-radius: 12px; background: #111827; color: #fff; }
    .btn.secondary { background: #e5e7eb; color: #111; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Оплата не завершена</h1>
      <p id="failText">Платёж через Toss не был завершён.</p>

      <div class="actions">
        <a class="btn" href="/">Вернуться в меню</a>
        <a class="btn secondary" href="/order-status.html">Проверить статус</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const message = params.get('message');

    if (code || message) {
      document.getElementById('failText').textContent =
        `Ошибка оплаты: ${code || ''} ${message || ''}`.trim();
    }
  </script>
</body>
</html>
